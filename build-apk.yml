name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'android-app/**'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools build-tools;34.0.0 platforms;android-34'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Generate Gradle Wrapper
        working-directory: android-app
        run: gradle wrapper --gradle-version 8.2

      - name: Build Debug APK
        working-directory: android-app
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p artifact
          cp android-app/app/build/outputs/apk/debug/app-debug.apk artifact/chohans-style-hub.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: chohans-style-hub-apk
          path: artifact/chohans-style-hub.apk
          retention-days: 90

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.${{ github.run_number }}
          name: Chohan's Style Hub APK v1.${{ github.run_number }}
          files: artifact/chohans-style-hub.apk
          body: |
            ## Chohan's Style Hub - Android APK

            Download the APK below and install it on your Android device.

            **Installation:**
            1. Download `chohans-style-hub.apk`
            2. Enable "Install from unknown sources" in Android settings
            3. Tap the APK file to install
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

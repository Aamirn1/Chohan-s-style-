<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D4A24E"/>
      <stop offset="0.45" stop-color="#E07A3C"/>
      <stop offset="1" stop-color="#C73E7A"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Large white scissors icon, hand-drawn paths, centered and scaled to fill ~70% -->
  <g stroke="white" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Left finger hole -->
    <circle cx="170" cy="342" r="48" stroke-width="22"/>
    <!-- Right finger hole -->
    <circle cx="342" cy="342" r="48" stroke-width="22"/>
    <!-- Left blade: from left hole going up-right to center pivot -->
    <line x1="200" y1="312" x2="256" y2="256"/>
    <!-- Left blade tip: from pivot to top-right -->
    <line x1="256" y1="256" x2="372" y2="140"/>
    <!-- Right blade: from right hole going up-left to center pivot -->
    <line x1="312" y1="312" x2="256" y2="256"/>
    <!-- Right blade tip: from pivot to top-left -->
    <line x1="256" y1="256" x2="140" y2="140"/>
    <!-- Center pivot screw -->
    <circle cx="256" cy="256" r="10" fill="white" stroke="none"/>
  </g>
</svg>
